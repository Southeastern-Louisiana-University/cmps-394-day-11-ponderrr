name: Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -t backend:ci ./backend

      - name: Run container
        run: docker run -d --name backend -p 8080:8080 backend:ci

      - name: Verify response
        run: |
          for i in {1..10}; do
            if curl -sf http://localhost:8080 | grep -q "Hello, World from Go backend!"; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f backend

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: backend:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
